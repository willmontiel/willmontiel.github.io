<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 847 580" role="img" aria-label="William Montiel">
  <!-- WM; monogram — one 5-stroke zigzag: a W (William) woven with an M (Montiel),
       closed by a semicolon (his code signature). Every inner stroke is split down its
       centre: ink on the left, accent orange on the right. The first stroke is all ink,
       the last all accent. Flat horizontal caps. -->
  <!-- accent (drawn first; ink overlays the split left halves on top) -->
  <g fill="#FF4A1C">
    <polygon points="305,16 323.5,16 185.5,564 167,564"/>
    <polygon points="305,16 323.5,16 459.5,564 441,564"/>
    <polygon points="577,16 595.5,16 459.5,564 441,564"/>
    <polygon points="558.5,16 595.5,16 725.5,564 688.5,564"/>
    <rect x="750" y="141" width="81" height="82"/>
    <rect x="750" y="319" width="81" height="82"/>
    <polygon points="815,401 831,401 787,469 771,469"/>
  </g>
  <!-- ink -->
  <g fill="#0a0a0a">
    <polygon points="15.5,16 52.5,16 185.5,564 148.5,564"/>
    <polygon points="286.5,16 305,16 167,564 148.5,564"/>
    <polygon points="286.5,16 305,16 441,564 422.5,564"/>
    <polygon points="558.5,16 577,16 441,564 422.5,564"/>
    <rect x="750" y="141" width="16" height="82"/>
    <rect x="750" y="319" width="16" height="82"/>
    <polygon points="815,401 828,401 773,469 760,469"/>
  </g>
</svg>
