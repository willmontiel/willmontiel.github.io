<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<script>
		/* Apply saved theme before first paint (default: light) */
		(function () {
			try { if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark'); } catch (e) {}
		})();
	</script>
	<link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
	<title>William Montiel — Senior Software Engineer</title>
	<meta name="description" content="William Montiel — Senior Software Engineer. Real-time, high-scale systems for logistics and fleet tracking." />

	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="css/main.css" />

	<script>
		/* CRT intro: "arm" (black + bright line) before the first paint, then
		   play once fonts + layout are ready — so the effect is never missed
		   on a cold, uncached load. No-op only when JS is unavailable. */
		(function () {
			var root = document.documentElement;
			root.classList.add('crt-arm');
			var played = false;
			function play() {
				if (played) return;
				played = true;
				root.classList.remove('crt-arm');
				root.classList.add('crt-play');
				var stage = document.querySelector('.crt-stage');
				if (stage) stage.addEventListener('animationend', function () {
					root.classList.remove('crt-play'); /* clean up → normal page */
				}, { once: true });
			}
			function start() { requestAnimationFrame(function () { requestAnimationFrame(play); }); }
			function whenReady() {
				if (document.fonts && document.fonts.ready) document.fonts.ready.then(start);
				else start();
				setTimeout(play, 2000); /* safety cap for slow/hung font loads */
			}
			if (document.readyState !== 'loading') whenReady();
			else document.addEventListener('DOMContentLoaded', whenReady);
		})();
	</script>
</head>
<body class="is-home">
	<button class="theme-toggle" type="button" aria-label="Switch to dark theme" aria-pressed="false" title="Toggle theme">
		<svg class="theme-toggle__icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
			<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
		</svg>
		<svg class="theme-toggle__icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
			<circle cx="12" cy="12" r="4" />
			<path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
		</svg>
	</button>
	<div class="crt-stage">
		<main class="home">
			<div class="home__block">
				<h1 class="home__name">William Montiel</h1>
				<p class="home__role">Senior Software Engineer</p>

				<hr class="rule" />

				<nav class="home__nav" aria-label="Primary">
					<a href="/about">About</a>
					<a href="/portfolio">Portfolio</a>
					<a href="/contact">Contact</a>
				</nav>
			</div>

			<footer class="home__foot">
				<p class="home__credo">Keep it simple.</p>
				<p class="home__meta">Cali, Colombia · 3.4516° N 76.5320° W</p>
			</footer>
		</main>
	</div>

	<script>
		/* Home nav — "channel change" on click (old-TV zap, then navigate) plus a
		   terminal-decode scramble on hover. Colour (stays orange while hovered) is
		   handled in CSS. No-op only when JS is unavailable. */
		(function () {
			var CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ#%&/()=<>*+';
			var links = document.querySelectorAll('.home__nav a');

			/* Preload the zap so the first click fires it instantly */
			var tv = new Audio('sounds/old-tv-sound.mp3');
			tv.preload = 'auto';

			links.forEach(function (el) {
				var label = el.textContent;

				/* Play the zap, then follow the link. Navigating would cut the audio
				   short, so defer it — until the sound ends, capped so it never drags. */
				el.addEventListener('click', function (e) {
					if (e.defaultPrevented || e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
					var href = el.getAttribute('href');
					if (!href) return;
					e.preventDefault();
					var went = false;
					function go() { if (went) return; went = true; window.location.href = href; }
					try {
						tv.currentTime = 0;
						var p = tv.play();
						if (p && typeof p.catch === 'function') p.catch(go);
					} catch (err) { go(); }
					tv.addEventListener('ended', go, { once: true });
					setTimeout(go, 650);
				});

				el.addEventListener('mouseenter', function () {
					var frame = 0;
					clearInterval(el._it);
					el._it = setInterval(function () {
						var out = '';
						for (var i = 0; i < label.length; i++) {
							out += (i < frame / 2) ? label[i] : CHARS[Math.floor(Math.random() * CHARS.length)];
						}
						el.textContent = out;
						if (frame / 2 >= label.length) { clearInterval(el._it); el.textContent = label; }
						frame++;
					}, 35);
				});
				el.addEventListener('mouseleave', function () { clearInterval(el._it); el.textContent = label; });
			});
		})();
	</script>
	<script src="js/theme.js" defer></script>
	<script src="js/glitch.js" defer></script>
</body>
</html>
